<!DOCTYPE html>
<html>
<head>
  <title>Todo List</title>
  <link rel="stylesheet" href="todo.css">
</head>

<body>

<div class="container">
  <h1>Todo List</h1>

  <input id="todoInput" placeholder="할 일 입력 후 Enter">

  <div class="lists">
    
    <div class="todo-section">
      <h3>해야 할 일</h3>
      <ul id="todoList"></ul>
    </div>

    <div class="done-section">
      <h3>해낸 일</h3>
      <ul id="doneList"></ul>
    </div>

  </div>
</div>

<script src="dist/todo.js"></script>

</body>
</html>
