<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- CSS 파일 업로드 -->
    <link rel="stylesheet" href="./style.css">
    <!-- JavaScript 파일 업로드 -->
    <script type="module" src="./dist/script.js" defer></script>
    <title>UMC TODO</title>
</head>
<body>
    <div class="todo-container">
        <h1 class="todo-container__header">UMC TODO</h1>
        <form id="todo-form" class="todo-container__form">
            <input 
                type="text"
                id="todo-input"
                class="todo-container__input"
                placeholder="할 일을 입력해 주세요."
                required
            >
            <button type="submit" class="todo-container__button">할 일 추가</button>
        </form>

        <div class="render-container">
            <div class="render-container__section">
                <h2 class="render-container__header">할 일</h2>
                <ul id="todo-list" class="render-container__list">
                    <!-- 할 일 항목 여기에 렌더링 -->
                </ul>
            </div>

            <div class="render-container__section">
                <h2 class="render-container__header">완료</h2>
                <ul id="done-list" class="render-container__list">
                    <!-- 완료된 항목 여기에 렌더링 -->
                </ul>
            </div>
        </div>
    </div>

    

</body>
</html>
